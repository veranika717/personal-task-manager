<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit User</title>

    <style>

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f1117;
            color: #e5e5e5;
        }

        .container {
            width: 40%;
            margin: 50px auto;
            background: #161a22;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-top: 12px;
            margin-bottom: 5px;
            color: #cbd5e1;
        }

        input {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: none;
            background: #0f1117;
            color: white;
            outline: none;
        }

        input:focus {
            border: 1px solid #4f46e5;
        }

        button {
            width: 100%;
            margin-top: 20px;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: #f59e0b;
            color: black;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #d97706;
        }

        .cancel {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #60a5fa;
            text-decoration: none;
        }

        .cancel:hover {
            text-decoration: underline;
        }

    </style>
</head>

<body>

<div class="container">

    <h1>👤 Edit User</h1>

    <form th:action="@{/users/edit/{id}(id=${user.id})}"
          th:object="${user}" method="post">

        <label>Username</label>
        <input type="text" th:field="*{username}" required>

        <label>Email</label>
        <input type="email" th:field="*{email}" required>

        <button type="submit">Update User</button>

    </form>

    <a class="cancel" href="/users">← Cancel</a>

</div>

</body>
</html>
