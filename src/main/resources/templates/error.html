<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Error</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }

        .error {
            color: red;
        }

        .message {
            margin: 20px 0;
            padding: 10px;
            background: #f5f5f5;
        }
    </style>
</head>
<body>

<h1 class="error">Something went wrong</h1>

<div class="message">
    <p><strong>Error:</strong> <span th:text="${message}">Error message</span></p>
    <p><strong>Time:</strong> <span th:text="${timestamp}">2024-01-01 12:00:00</span></p>
</div>

<a href="/tasks">Back to Tasks</a>

</body>
</html>
