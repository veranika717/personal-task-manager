<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Error</title>

    <style>

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f1117;
            color: #e5e5e5;
        }

        .container {
            width: 50%;
            margin: 80px auto;
            background: #161a22;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0,0,0,0.6);
            text-align: center;
        }

        h1 {
            color: #ef4444;
            margin-bottom: 20px;
        }

        .box {
            background: #0f1117;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            text-align: left;
        }

        .label {
            color: #94a3b8;
            font-size: 13px;
        }

        .value {
            margin-bottom: 10px;
        }

        a {
            display: inline-block;
            margin-top: 20px;
            color: #60a5fa;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .icon {
            font-size: 40px;
        }

    </style>
</head>

<body>

<div class="container">

    <div class="icon">⚠️</div>

    <h1>Something went wrong</h1>

    <div class="box">

        <div class="value">
            <div class="label">Error</div>
            <div th:text="${message}">Error message</div>
        </div>

        <div class="value">
            <div class="label">Timestamp</div>
            <div th:text="${timestamp}">2024-01-01 12:00:00</div>
        </div>

        <div class="value">
            <div class="label">Status</div>
            <div th:text="${status}">500</div>
        </div>

    </div>

    <a href="/tasks">← Back to Tasks</a>

</div>

</body>
</html>
