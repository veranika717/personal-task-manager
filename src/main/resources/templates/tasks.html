<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Task Manager</title>

    <style>

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f1117;
            color: #e5e5e5;
        }

        h1 {
            text-align: center;
            padding: 20px;
            color: #ffffff;
        }

        .container {
            width: 95%;
            margin: auto;
        }

        .search-form {
            background: #161a22;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        input, select {
            padding: 8px;
            border-radius: 6px;
            border: none;
            background: #0f1117;
            color: white;
            outline: none;
        }

        button {
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: #4f46e5;
            color: white;
        }

        button:hover {
            background: #3730a3;
        }

        a {
            color: #60a5fa;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #161a22;
            border-radius: 10px;
            overflow: hidden;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #2a2f3a;
            text-align: left;
        }

        th {
            background: #1f2430;
            color: #ffffff;
        }

        tr:hover {
            background: #1a1f2b;
        }

        .status {
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 12px;
        }

        .UPCOMING {
            background: #facc15;
            color: black;
        }

        .DONE {
            background: #22c55e;
            color: black;
        }

        .OVERDUE {
            background: #ef4444;
            color: white;
        }

        .actions a {
            margin-right: 10px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 20px 0;
        }

        .add-btn {
            background: #10b981;
            padding: 8px 12px;
            border-radius: 8px;
            color: white;
        }

    </style>
</head>

<body>

<h1>📋 Task Manager</h1>

<div class="container">

    <div class="search-form">

        <form method="get">

            <input type="text" name="keyword" placeholder="Search..."
                   th:value="${keyword}">

            <select name="status">
                <option value="">All Statuses</option>
                <option th:each="s : ${statuses}"
                        th:value="${s}"
                        th:text="${s}"
                        th:selected="${status == s}">
                </option>
            </select>

            <select name="userId">
                <option value="">All Users</option>
                <option th:each="user : ${users}"
                        th:value="${user.id}"
                        th:text="${user.username}">
                </option>
            </select>

            <button type="submit">Search</button>
            <a href="/tasks">Clear</a>

        </form>

    </div>

    <div class="top-bar">
        <a class="add-btn" href="/tasks/new">+ Add Task</a>
        <a href="/users">Users</a>
    </div>

    <table>

        <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Description</th>
            <th>Deadline</th>
            <th>Status</th>
            <th>User</th>
            <th>Actions</th>
        </tr>

        <tr th:each="t : ${tasks}">

            <td th:text="${t.id}"></td>
            <td th:text="${t.title}"></td>
            <td th:text="${t.description}"></td>

            <td th:text="${#temporals.format(t.deadline, 'yyyy-MM-dd HH:mm')}"></td>

            <td>
                <span class="status"
                      th:classappend="${t.status}"
                      th:text="${t.status}">
                </span>
            </td>

            <td th:text="${t.user != null ? t.user.username : 'No user'}"></td>

            <td class="actions">
                <a th:href="@{/tasks/{id}(id=${t.id})}">View</a>
                <a th:href="@{/tasks/edit/{id}(id=${t.id})}">Edit</a>
                <a th:href="@{/tasks/delete/{id}(id=${t.id})}"
                   onclick="return confirm('Delete this task?')">
                    Delete
                </a>
            </td>

        </tr>

    </table>

</div>

</body>
</html>
