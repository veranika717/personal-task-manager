<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="">
<head>
    <title>View Task</title>
</head>
<body>

<h1>Task Details</h1>

<p><strong>ID:</strong> <span th:text="${task.id}"></span></p>
<p><strong>Title:</strong> <span th:text="${task.title}"></span></p>
<p><strong>Description:</strong> <span th:text="${task.description}"></span></p>
<p><strong>Deadline:</strong> <span th:text="${#temporals.format(task.deadline, 'yyyy-MM-dd HH:mm')}"></span></p>
<p><strong>Status:</strong> <span th:text="${task.status}"></span></p>
<p><strong>User:</strong> <span th:text="${task.user != null ? task.user.username : 'No user'}"></span></p>

<p>
    <a th:href="@{/tasks/edit/{id}(id=${task.id})}">Edit</a> |
    <a href="/tasks">Back to list</a>
</p>

</body>
</html>
