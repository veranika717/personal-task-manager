<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Create User</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f1117;
            color: #e5e5e5;
        }

        .container {
            width: 40%;
            margin: 50px auto;
            background: #161a22;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-top: 12px;
            margin-bottom: 5px;
            color: #cbd5e1;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: none;
            background: #0f1117;
            color: white;
            outline: none;
            box-sizing: border-box;
        }

        input:focus, select:focus {
            border: 1px solid #4f46e5;
        }

        button {
            width: 100%;
            margin-top: 20px;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: #10b981;
            color: black;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #059669;
        }

        .back {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #60a5fa;
            text-decoration: none;
        }

        .back:hover {
            text-decoration: underline;
        }

        .error {
            color: #ef4444;
            font-size: 13px;
            margin-top: 3px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>➕ Create User</h1>

    <form th:action="@{/users/new}" th:object="${user}" method="post">

        <label>Username</label>
        <input type="text" th:field="*{username}">
        <div class="error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>

        <label>Email</label>
        <input type="email" th:field="*{email}">
        <div class="error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>

        <label>Password</label>
        <input type="password" th:field="*{password}" placeholder="Enter password">
        <div class="error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>

        <label>Role</label>
        <select th:field="*{role}">
            <option value="USER">USER</option>
            <option value="MANAGER">MANAGER</option>
        </select>

        <button type="submit">Create User</button>
    </form>

    <a class="back" href="/users">← Back</a>
</div>
</body>
</html>
