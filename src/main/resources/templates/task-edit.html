<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Task</title>

    <style>

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f1117;
            color: #e5e5e5;
        }

        .container {
            width: 40%;
            margin: 50px auto;
            background: #161a22;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-top: 12px;
            margin-bottom: 5px;
            color: #cbd5e1;
        }

        input {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: none;
            background: #0f1117;
            color: white;
            outline: none;
        }

        input:focus {
            border: 1px solid #4f46e5;
        }

        .error {
            color: #ef4444;
            font-size: 13px;
            margin-top: 3px;
        }

        button {
            width: 100%;
            margin-top: 20px;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: #f59e0b;
            color: black;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #d97706;
        }

        .back {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #60a5fa;
            text-decoration: none;
        }

        .back:hover {
            text-decoration: underline;
        }

    </style>
</head>

<body>

<div class="container">

    <h1>✏ Edit Task</h1>

    <form th:action="@{/tasks/edit/{id}(id=${taskId})}"
          th:object="${task}" method="post">

        <label>Title</label>
        <input type="text" th:field="*{title}">
        <div class="error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>

        <label>Description</label>
        <input type="text" th:field="*{description}">
        <div class="error" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>

        <label>Deadline</label>
        <input type="datetime-local" th:field="*{deadline}">
        <div class="error" th:if="${#fields.hasErrors('deadline')}" th:errors="*{deadline}"></div>

        <button type="submit">Update Task</button>

    </form>

    <a class="back" href="/tasks">← Back to tasks</a>

</div>

</body>
</html>
