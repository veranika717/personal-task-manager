<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Users</title>

    <style>

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f1117;
            color: #e5e5e5;
        }

        .container {
            width: 90%;
            margin: 50px auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .btn-add {
            background: #10b981;
            padding: 8px 12px;
            border-radius: 8px;
            color: black;
            text-decoration: none;
        }

        .btn-add:hover {
            background: #059669;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #161a22;
            border-radius: 10px;
            overflow: hidden;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #2a2f3a;
            text-align: left;
        }

        th {
            background: #1f2430;
            color: white;
        }

        tr:hover {
            background: #1a1f2b;
        }

        a {
            color: #60a5fa;
            text-decoration: none;
            margin-right: 10px;
        }

        a:hover {
            text-decoration: underline;
        }

        .back {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #60a5fa;
        }

    </style>
</head>

<body>

<div class="container">

    <h1>👤 Users</h1>

    <div class="top-bar">
        <a class="btn-add" href="/users/new">➕ Add New User</a>
        <a href="/tasks">← Back to Tasks</a>
    </div>

    <table>

        <tr>
            <th>ID</th>
            <th>Username</th>
            <th>Email</th>
            <th>Created At</th>
            <th>Actions</th>
        </tr>

        <tr th:each="u : ${users}">

            <td th:text="${u.id}"></td>
            <td th:text="${u.username}"></td>
            <td th:text="${u.email}"></td>

            <td th:text="${#temporals.format(u.createdAt, 'yyyy-MM-dd')}"></td>

            <td>
                <a th:href="@{/users/{id}(id=${u.id})}">View</a>
                <a th:href="@{/users/edit/{id}(id=${u.id})}">Edit</a>
                <a th:href="@{/users/delete/{id}(id=${u.id})}"
                   onclick="return confirm('Delete this user?')">
                    Delete
                </a>
            </td>

        </tr>

    </table>

</div>

</body>
</html>
